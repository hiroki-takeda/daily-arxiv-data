name: Publish Daily arXiv data

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm test
      - run: npm run validate

  deploy:
    needs: validate
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - name: Assemble validated static site
        run: |
          mkdir -p "${{ runner.temp }}/daily-arxiv-site/data/reports"
          cp -R public/. "${{ runner.temp }}/daily-arxiv-site/"
          cp data/reports/*.json "${{ runner.temp }}/daily-arxiv-site/data/reports/"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/daily-arxiv-site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
